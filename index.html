<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORY MODE | Bearcat Green</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="images/bg-favicon.png">
</head>

<body>

    <div id="video-container">
        <video id="story-video" playsinline>
            Your browser does not support the video tag.
        </video>

        <!-- NEW: Hidden Timer Audio Element -->
        <audio id="timer-sound" src="sound/7sec.mp3" preload="auto"></audio>

        <button id="start-btn">Start the Story</button>

        <div id="resume-overlay">
            <h2>Resume your story?</h2>
            <div class="resume-buttons">
                <button id="resume-yes">Yes, continue</button>
                <button id="resume-no">No, restart</button>
            </div>
        </div>

        <div id="choices-overlay">
            <div id="timer-container">
                <svg class="progress-ring" width="80" height="80">
                    <circle class="progress-ring__circle" stroke="white" stroke-width="6" fill="transparent" r="34"
                        cx="40" cy="40" />
                </svg>
                <div id="timer-text">5</div>
            </div>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="progress-tooltip">Track your recycling score metrics here</div>

        <button id="subtitle-btn" aria-label="Toggle Subtitles">
            CC
            <div class="cc-tooltip">Toggle subtitles & closed captions</div>
        </button>

        <button id="hamburger-btn" aria-label="Open Menu">
            <svg viewBox="0 0 24 24" width="30" height="30" fill="white">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
            <div class="menu-tooltip">Open pause and navigation menu</div>
        </button>

        <div id="pause-menu-overlay">
            <div id="menu-main-panel" class="menu-panel">
                <button id="menu-continue" class="menu-btn">Continue</button>
                <button id="menu-restart" class="menu-btn">Restart Experience</button>
                <button id="menu-mainmenu" class="menu-btn">Back to Main Menu</button>
            </div>

            <div id="menu-confirm-panel" class="menu-panel">
                <h2 id="confirm-text">Are you sure?</h2>
                <p id="confirm-subtext">You can always come back and start where you left off.</p>
                <div class="confirm-buttons">
                    <button id="confirm-yes" class="menu-btn confirm-yes-btn">Yes</button>
                    <button id="confirm-no" class="menu-btn confirm-no-btn">No, go back</button>
                </div>
            </div>
        </div>

        <div id="end-overlay">
            <h2>End of prototype</h2>
            <p>Thanks for testing out this experience.</p>
            <button id="end-mainmenu" class="menu-btn">Back to Main Menu</button>
        </div>

        <div id="dev-menu-overlay">
            <h2>Developer Menu</h2>

            <div id="dev-auth-container">
                <input type="password" id="dev-passcode-input" placeholder="Enter Passcode">

                <p id="dev-auth-error" style="color: #f00; font-family: monospace; display: none;">Access Denied</p>
                <button id="dev-auth-close-btn" class="menu-btn"
                    style="margin-top: 20px; font-size: 1rem; padding: 10px 20px;">Close</button>
            </div>

            <div id="dev-content" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                <div class="dev-buttons">
                    <button class="dev-btn" data-node="intro">Skip to Chapter 1</button>
                    <button class="dev-btn" data-node="chap2">Skip to Chapter 2</button>
                    <button class="dev-btn" data-node="chap3">Skip to Chapter 3</button>
                    <button class="dev-btn" data-node="chap4">Skip to Chapter 4</button>
                    <button class="dev-btn" data-node="chap5">Skip to Chapter 5</button>
                    <button class="dev-btn" data-node="chap6">Skip to Chapter 6</button>
                    <button class="dev-btn" data-node="chap7">Skip to Chapter 7</button>
                </div>
                <button id="dev-close-btn" class="menu-btn">Close Dev Menu</button>
            </div>
        </div>

        <!-- NEW: Outcome Feedback Screen -->
        <div id="outcome-overlay">
            <div class="outcome-box">
                <h2 id="outcome-title">Good Job!</h2>
                <p id="outcome-text">Explanation text goes here.</p>
                <button id="outcome-next-btn" class="menu-btn">Next Chapter</button>
            </div>
        </div>

        <!-- NEW: Active Preloader Screen -->
        <div id="chapter-loader-overlay">
            <div class="loader-content">
                <div class="spinner"></div>
                <h2>LOADING...</h2>
                <div id="loader-progress-container">
                    <div id="loader-progress-bar"></div>
                </div>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
